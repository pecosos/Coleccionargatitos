<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gatos · Minijuego ultra aleatorio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: white;
            font-family: system-ui, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .game {
            text-align: center;
            max-width: 750px;
        }
        .plato-area {
            font-size: 4rem;
            margin: 0.5rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .plato { font-size: 4rem; }
        .comida { font-size: 3.8rem; min-width: 5rem; }
        button, select {
            font-size: 1rem;
            padding: 0.4rem 1rem;
            margin: 0.4rem;
            background: #eee;
            border: 1px solid #999;
            cursor: pointer;
            font-family: inherit;
        }
        button:active { background: #ccc; }
        select { background: white; }
        .gato-canvas-container {
            margin: 0.8rem auto;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            background: white;
            width: 280px;
            height: 280px;
            box-shadow: none;
            border: none;
        }
        .input-nombre { margin: 0.5rem 0; }
        input {
            font-size: 1rem;
            padding: 0.4rem;
            border: 1px solid #aaa;
            background: white;
        }
        .coleccion {
            margin-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }
        .gato-coleccionado {
            background: #fafafa;
            border: 1px solid #ccc;
            padding: 0.4rem;
            text-align: center;
            width: 100px;
            cursor: pointer;
            transition: 0.1s;
        }
        .gato-coleccionado:hover { background: #f0f0f0; }
        .gato-coleccionado canvas {
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto;
            background: white;
        }
        .gato-coleccionado .nombre {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            font-weight: 500;
            word-break: break-word;
        }
        .rareza-texto {
            font-size: 0.65rem;
            font-weight: bold;
            margin-top: 0.2rem;
        }
        hr { margin: 0.8rem 0; border-color: #ccc; }
        .vacio-coleccion {
            font-size: 0.9rem;
            color: #666;
            background: #f5f5f5;
            padding: 0.3rem 1rem;
        }
        .mensaje {
            background: #e8f0fe;
            padding: 0.3rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .fusion-btn {
            background: #ff9800;
            color: black;
            border: none;
            font-weight: bold;
            margin-left: 0.5rem;
        }
        .minijuego-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 1.5rem;
            text-align: center;
            max-width: min(90vw, 650px);
            overflow-x: auto;
        }
        .menu-minijuego {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        .puntuacion-menu {
            font-size: 1.2rem;
            background: #ffd966;
            padding: 0.3rem 1rem;
            font-weight: bold;
        }
        .board {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .card {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border: 2px solid #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .card canvas, .card img {
            width: 90px;
            height: 90px;
            display: none;
        }
        .card.flipped canvas, .card.matched canvas,
        .card.flipped img, .card.matched img {
            display: block;
        }
        .card:not(.flipped):not(.matched)::before {
            content: "?";
            font-size: 3rem;
            color: #555;
        }
        .card.matched {
            background: #90EE90;
            border-color: #2e7d32;
        }
        .card.wrong {
            background: #ffcccc;
            border-color: #c62828;
        }
        .modal button {
            margin-top: 10px;
            padding: 5px 15px;
        }
        .btn-par {
            background: #4caf50;
            color: white;
            font-size: 1.2rem;
            padding: 0.5rem 2rem;
        }
        .volver-btn {
            background: #999;
        }
        .victoria-mensaje {
            background: #4caf50;
            color: white;
            padding: 0.5rem;
            margin: 0.5rem 0;
            font-weight: bold;
        }
        .puntos-victoria {
            background: gold;
            color: black;
            padding: 0.3rem;
            margin-top: 0.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game">
    <div class="plato-area">
        <span class="plato">🍽️</span>
        <span class="comida" id="comidaEnPlato">⚪</span>
    </div>

    <div class="gato-canvas-container">
        <canvas id="catCanvas" width="280" height="280"></canvas>
    </div>

    <div>
        <select id="selectorComida">
            <option value="🍕">🍕 Pizza</option>
            <option value="🍔">🍔 Hamburguesa</option>
            <option value="🍣">🍣 Sushi</option>
            <option value="🍜">🍜 Ramen</option>
            <option value="🥗">🥗 Ensalada</option>
            <option value="🍦">🍦 Helado</option>
            <option value="🍎">🍎 Manzana</option>
            <option value="🌮">🌮 Taco</option>
        </select>
        <button id="btnElegirComida">ELEGIR COMIDA</button>
    </div>

    <div id="zonaNombre" style="margin-top: 0.8rem; display: none;">
        <div class="input-nombre">
            <input type="text" id="nombreGatoInput" placeholder="nombre del gato" maxlength="20" autocomplete="off">
            <button id="btnPonerNombre">PONER NOMBRE</button>
        </div>
    </div>

    <div id="mensajeInfo" class="mensaje" style="display: none;"></div>
    
    <div style="margin: 0.5rem 0;">
        <button id="btnFusionar" style="background: #ff9800;">✨ FUSIONAR (3 iguales)</button>
        <button id="btnMinijuego" style="background: #4caf50; margin-left: 0.5rem;" disabled>🎮 MINIJUEGO (2+ gatos)</button>
    </div>

    <hr>
    <div id="coleccionGatos" class="coleccion"></div>
</div>

<div id="modalJuego" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
    (function(){
        // ---------- ESTADO PRINCIPAL ----------
        let comidaActual = null;            
        let gatoPresente = null;
        let coleccion = [];
        let timeoutLlegada = null;
        let puntosMinijuego = 0;
        
        const comidasBase = ["🍕", "🍔", "🍣", "🍜", "🥗", "🍦", "🍎", "🌮"];
        let comidasEspeciales = [];
        
        // DOM
        const comidaEnPlatoSpan = document.getElementById("comidaEnPlato");
        const selectorComida = document.getElementById("selectorComida");
        const btnElegirComida = document.getElementById("btnElegirComida");
        const zonaNombre = document.getElementById("zonaNombre");
        const nombreGatoInput = document.getElementById("nombreGatoInput");
        const btnPonerNombre = document.getElementById("btnPonerNombre");
        const coleccionDiv = document.getElementById("coleccionGatos");
        const mensajeInfoDiv = document.getElementById("mensajeInfo");
        const btnFusionar = document.getElementById("btnFusionar");
        const btnMinijuego = document.getElementById("btnMinijuego");
        const canvas = document.getElementById('catCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById("modalJuego");
        const modalContent = document.getElementById("modalContent");
        
        canvas.width = 280;
        canvas.height = 280;
        
        // ---------- RAREZA Y COLORES ----------
        const RAREZAS = [
            { nombre: "Común", min: 50, max: 60, numColores: 1 },
            { nombre: "Medio", min: 60, max: 70, numColores: 2 },
            { nombre: "Bueno", min: 70, max: 80, numColores: 3 },
            { nombre: "Épico", min: 80, max: 90, numColores: 5 },
            { nombre: "Legendario", min: 90, max: 100, numColores: 20 }
        ];
        
        const PALETA_VIVA = [
            "#FF0000", "#00FF00", "#0000FF", "#FFFF00", "#FF00FF", "#00FFFF", 
            "#FFA500", "#FF1493", "#7FFF00", "#8A2BE2", "#DC143C", "#00CED1", 
            "#FFD700", "#ADFF2F", "#FF4500", "#1E90FF", "#32CD32", "#FF69B4", 
            "#9ACD32", "#FF6347", "#40E0D0", "#EE82EE", "#F0E68C", "#DDA0DD"
        ];
        
        const PARTES = [
            "cabeza", "orejaIzq", "orejaDer", "interiorOreja", "cuerpo", "pataIzq", "pataDer", "cola",
            "sombreroAla", "sombreroCopa", "sombreroTapa", "cinta", "mejillaIzq", "mejillaDer",
            "pupila", "nariz", "bigote", "ceja", "bocaColor"
        ];
        
        function colorAleatorioVivo() { return PALETA_VIVA[Math.floor(Math.random() * PALETA_VIVA.length)]; }
        
        function generarColoresPorPuntuacion(puntuacion) {
            let rareza = RAREZAS.find(r => puntuacion >= r.min && puntuacion < r.max);
            if (!rareza) rareza = RAREZAS[RAREZAS.length-1];
            const maxColores = rareza.numColores;
            let coloresUsados = [];
            let colores = {};
            for (let parte of PARTES) {
                let color;
                if (rareza.nombre === "Legendario") color = colorAleatorioVivo();
                else if (rareza.nombre === "Épico") {
                    if (coloresUsados.length < maxColores && (coloresUsados.length === 0 || Math.random() > 0.4)) {
                        color = colorAleatorioVivo();
                        if (!coloresUsados.includes(color)) coloresUsados.push(color);
                    } else color = coloresUsados[Math.floor(Math.random() * coloresUsados.length)];
                } else {
                    if (coloresUsados.length < maxColores) {
                        color = colorAleatorioVivo();
                        coloresUsados.push(color);
                    } else color = coloresUsados[Math.floor(Math.random() * coloresUsados.length)];
                }
                colores[parte] = color;
            }
            if (rareza.nombre === "Común" && coloresUsados.length > 0) {
                let colorUnico = coloresUsados[0];
                for (let parte of PARTES) colores[parte] = colorUnico;
            }
            else if (rareza.nombre === "Medio" && coloresUsados.length === 2) {
                let mitad = Math.floor(PARTES.length / 2);
                for (let i = 0; i < PARTES.length; i++) colores[PARTES[i]] = i < mitad ? coloresUsados[0] : coloresUsados[1];
            }
            else if (rareza.nombre === "Bueno" && coloresUsados.length === 3) {
                for (let i = 0; i < PARTES.length; i++) colores[PARTES[i]] = coloresUsados[i % 3];
            }
            colores.ojoBlanco = "#FFFFFF";
            return colores;
        }
        
        function obtenerRarezaPorPuntuacion(punt) {
            for (let r of RAREZAS) if (punt >= r.min && punt < r.max) return r.nombre;
            return "Legendario";
        }
        
        function generarGatoAleatorio() {
            let rand = Math.random() * 100;
            let puntuacion;
            if (rand < 50) puntuacion = 50 + Math.random() * 10;
            else if (rand < 75) puntuacion = 60 + Math.random() * 10;
            else if (rand < 90) puntuacion = 70 + Math.random() * 10;
            else if (rand < 97) puntuacion = 80 + Math.random() * 10;
            else puntuacion = 90 + Math.random() * 10;
            puntuacion = Math.min(99.9, Math.max(50, puntuacion));
            const colores = generarColoresPorPuntuacion(puntuacion);
            const rareza = obtenerRarezaPorPuntuacion(puntuacion);
            return { colores, rareza, puntuacion: Math.round(puntuacion) };
        }
        
        function generarGatoConPuntuacion(puntuacion) {
            const colores = generarColoresPorPuntuacion(puntuacion);
            const rareza = obtenerRarezaPorPuntuacion(puntuacion);
            return { colores, rareza, puntuacion };
        }
        
        // Dibujo
        function dibujarGatoEnContexto(ctxDest, widthDest, heightDest, colores) {
            if (!colores) return;
            ctxDest.save();
            ctxDest.clearRect(0, 0, widthDest, heightDest);
            const scaleX = widthDest / 500;
            const scaleY = heightDest / 500;
            ctxDest.scale(scaleX, scaleY);
            ctxDest.lineWidth = 2.5;
            ctxDest.strokeStyle = "#000000";
            
            ctxDest.beginPath(); ctxDest.arc(250, 260, 85, 0, Math.PI * 2);
            ctxDest.fillStyle = colores.cabeza; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(185,205); ctxDest.lineTo(165,140); ctxDest.lineTo(220,185); ctxDest.closePath();
            ctxDest.fillStyle = colores.orejaIzq; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(315,205); ctxDest.lineTo(335,140); ctxDest.lineTo(280,185); ctxDest.closePath();
            ctxDest.fillStyle = colores.orejaDer; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(190,200); ctxDest.lineTo(176,155); ctxDest.lineTo(215,188); ctxDest.closePath();
            ctxDest.fillStyle = colores.interiorOreja; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(310,200); ctxDest.lineTo(324,155); ctxDest.lineTo(285,188); ctxDest.closePath();
            ctxDest.fill(); ctxDest.stroke();
            
            ctxDest.fillStyle = colores.ojoBlanco;
            ctxDest.beginPath(); ctxDest.ellipse(215,245,14,18,0,0,Math.PI*2); ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.ellipse(285,245,14,18,0,0,Math.PI*2); ctxDest.fill(); ctxDest.stroke();
            ctxDest.fillStyle = colores.pupila;
            ctxDest.beginPath(); ctxDest.ellipse(215,245,6,12,0,0,Math.PI*2); ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.ellipse(285,245,6,12,0,0,Math.PI*2); ctxDest.fill(); ctxDest.stroke();
            ctxDest.fillStyle = "#FFFFFF";
            ctxDest.beginPath(); ctxDest.arc(211,239,3,0,Math.PI*2); ctxDest.fill();
            ctxDest.beginPath(); ctxDest.arc(281,239,3,0,Math.PI*2); ctxDest.fill();
            
            ctxDest.beginPath(); ctxDest.moveTo(245,275); ctxDest.lineTo(255,275); ctxDest.lineTo(250,283); ctxDest.closePath();
            ctxDest.fillStyle = colores.nariz; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(250,283); ctxDest.quadraticCurveTo(240,295,230,288);
            ctxDest.moveTo(250,283); ctxDest.quadraticCurveTo(260,295,270,288);
            ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(180,268); ctxDest.lineTo(140,262);
            ctxDest.moveTo(180,275); ctxDest.lineTo(138,278); ctxDest.moveTo(182,282); ctxDest.lineTo(145,292);
            ctxDest.moveTo(320,268); ctxDest.lineTo(360,262); ctxDest.moveTo(320,275); ctxDest.lineTo(362,278);
            ctxDest.moveTo(318,282); ctxDest.lineTo(355,292); ctxDest.stroke();
            
            ctxDest.beginPath(); ctxDest.ellipse(250,370,95,70,0,0,Math.PI*2);
            ctxDest.fillStyle = colores.cuerpo; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.ellipse(205,405,28,38,-0.2,0,Math.PI*2);
            ctxDest.fillStyle = colores.pataIzq; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.ellipse(295,405,28,38,0.2,0,Math.PI*2);
            ctxDest.fillStyle = colores.pataDer; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(345,380); ctxDest.quadraticCurveTo(390,360,380,410);
            ctxDest.quadraticCurveTo(370,430,355,415); ctxDest.fillStyle = colores.cola; ctxDest.fill(); ctxDest.stroke();
            
            ctxDest.beginPath(); ctxDest.ellipse(250,150,105,28,0,0,Math.PI*2);
            ctxDest.fillStyle = colores.sombreroAla; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.rect(195,70,110,82);
            ctxDest.fillStyle = colores.sombreroCopa; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.ellipse(250,70,57,18,0,0,Math.PI*2);
            ctxDest.fillStyle = colores.sombreroTapa; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.rect(195,122,110,14);
            ctxDest.fillStyle = colores.cinta; ctxDest.fill(); ctxDest.stroke();
            
            ctxDest.beginPath(); ctxDest.arc(195,278,8,0,Math.PI*2);
            ctxDest.fillStyle = colores.mejillaIzq; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.arc(305,278,8,0,Math.PI*2);
            ctxDest.fillStyle = colores.mejillaDer; ctxDest.fill(); ctxDest.stroke();
            ctxDest.beginPath(); ctxDest.moveTo(198,222); ctxDest.quadraticCurveTo(210,215,225,221);
            ctxDest.moveTo(275,221); ctxDest.quadraticCurveTo(290,215,302,222);
            ctxDest.stroke();
            ctxDest.restore();
        }
        
        function dibujarGatoActual(colores) { if(colores) dibujarGatoEnContexto(ctx,280,280,colores); else limpiarCanvas(); }
        function limpiarCanvas() { ctx.clearRect(0,0,280,280); }
        function refrescarGatoEnCanvas() { if(gatoPresente?.colores) dibujarGatoActual(gatoPresente.colores); else limpiarCanvas(); }
        
        // UI principal
        function actualizarSelectorComidas() {
            let opciones = [...comidasBase, ...comidasEspeciales];
            selectorComida.innerHTML = "";
            for(let opt of opciones) {
                let option = document.createElement("option");
                option.value = opt; option.textContent = opt;
                selectorComida.appendChild(option);
            }
        }
        
        function mostrarMensaje(texto) {
            mensajeInfoDiv.style.display = "block";
            mensajeInfoDiv.textContent = texto;
            setTimeout(() => mensajeInfoDiv.style.display = "none", 3000);
        }
        
        function renderizarColeccion() {
            coleccionDiv.innerHTML = "";
            if(coleccion.length === 0) {
                const vacio = document.createElement("div");
                vacio.className = "vacio-coleccion";
                vacio.textContent = "📦 sin gatos coleccionados";
                coleccionDiv.appendChild(vacio);
            } else {
                for(let gato of coleccion) {
                    const contenedor = document.createElement("div");
                    contenedor.className = "gato-coleccionado";
                    const miniCanvas = document.createElement("canvas");
                    miniCanvas.width = 80; miniCanvas.height = 80;
                    const miniCtx = miniCanvas.getContext("2d");
                    dibujarGatoEnContexto(miniCtx, 80, 80, gato.colores);
                    const nombreSpan = document.createElement("div");
                    nombreSpan.className = "nombre";
                    nombreSpan.textContent = gato.nombre;
                    const rarezaSpan = document.createElement("div");
                    rarezaSpan.className = "rareza-texto";
                    rarezaSpan.textContent = `${gato.rareza} ${gato.puntuacion}pts`;
                    contenedor.appendChild(miniCanvas); contenedor.appendChild(nombreSpan); contenedor.appendChild(rarezaSpan);
                    coleccionDiv.appendChild(contenedor);
                }
            }
            btnMinijuego.disabled = (coleccion.length < 2);
        }
        
        function actualizarPlatoUI() { comidaEnPlatoSpan.textContent = comidaActual ?? "⚪"; }
        function cancelarTimer() { if(timeoutLlegada) { clearTimeout(timeoutLlegada); timeoutLlegada = null; } }
        
        function programarLlegada() {
            cancelarTimer();
            if(gatoPresente !== null) return;
            if(comidaActual === null) return;
            const delay = Math.floor(Math.random() * (7000 - 4000 + 1) + 4000);
            timeoutLlegada = setTimeout(() => {
                if(gatoPresente === null && comidaActual !== null) {
                    const nuevo = generarGatoAleatorio();
                    gatoPresente = { ...nuevo, nombre: null };
                    btnElegirComida.disabled = true;
                    selectorComida.disabled = true;
                    zonaNombre.style.display = "block";
                    nombreGatoInput.value = "";
                    nombreGatoInput.focus();
                    refrescarGatoEnCanvas();
                    mostrarMensaje(`✨ ¡Llegó un gato ${nuevo.rareza}! (${nuevo.puntuacion} pts)`);
                }
                timeoutLlegada = null;
            }, delay);
        }
        
        function elegirComida() {
            if(gatoPresente !== null) return;
            comidaActual = selectorComida.value;
            actualizarPlatoUI();
            cancelarTimer();
            if(comidaActual !== null && gatoPresente === null) programarLlegada();
        }
        
        function ponerNombreYColeccionar() {
            if(!gatoPresente) return;
            const nombreRaw = nombreGatoInput.value.trim();
            if(nombreRaw === "") return;
            const nombreFinal = nombreRaw.slice(0,20);
            coleccion.push({ nombre: nombreFinal, colores: { ...gatoPresente.colores }, rareza: gatoPresente.rareza, puntuacion: gatoPresente.puntuacion });
            comidaActual = null;
            actualizarPlatoUI();
            gatoPresente = null;
            btnElegirComida.disabled = false;
            selectorComida.disabled = false;
            zonaNombre.style.display = "none";
            nombreGatoInput.value = "";
            limpiarCanvas();
            cancelarTimer();
            renderizarColeccion();
            mostrarMensaje(`🐱 ¡${nombreFinal} (${coleccion[coleccion.length-1].rareza}) coleccionado!`);
        }
        
        function fusionar() {
            const rarezas = ["Común", "Medio", "Bueno", "Épico", "Legendario"];
            for(let idx=0; idx<rarezas.length-1; idx++) {
                const rarezaActual = rarezas[idx];
                const siguienteRareza = rarezas[idx+1];
                const gatosMismaRareza = coleccion.filter(g => g.rareza === rarezaActual);
                if(gatosMismaRareza.length >= 3) {
                    let indicesAEliminar = [];
                    let count = 0;
                    for(let i=0; i<coleccion.length && count<3; i++) {
                        if(coleccion[i].rareza === rarezaActual) { indicesAEliminar.push(i); count++; }
                    }
                    for(let i=indicesAEliminar.length-1; i>=0; i--) coleccion.splice(indicesAEliminar[i],1);
                    let nuevaPuntuacion = siguienteRareza === "Medio"?65 : siguienteRareza==="Bueno"?75 : siguienteRareza==="Épico"?85 : 95;
                    const nuevoGato = generarGatoConPuntuacion(nuevaPuntuacion);
                    coleccion.push({ nombre: `Fusión ${siguienteRareza}`, colores: nuevoGato.colores, rareza: siguienteRareza, puntuacion: nuevaPuntuacion });
                    const nuevaComida = `🍱${siguienteRareza.slice(0,3)}`;
                    if(!comidasEspeciales.includes(nuevaComida) && !comidasBase.includes(nuevaComida)) {
                        comidasEspeciales.push(nuevaComida);
                        actualizarSelectorComidas();
                        mostrarMensaje(`🎁 ¡NUEVA COMIDA: ${nuevaComida}!`);
                    }
                    renderizarColeccion();
                    mostrarMensaje(`✨ Fusión: 3x${rarezaActual} → 1x${siguienteRareza}`);
                    return;
                }
            }
            mostrarMensaje("❌ Necesitas 3 gatos de la misma rareza");
        }
        
        // ---------- MINIJUEGO CON MEZCLA ULTRA ALEATORIA ----------
        let juegoCards = [], lock = false, firstIdx = null, timeoutId = null, wrong1=null, wrong2=null;
        let gameWin = false;
        
        // Función de mezcla súper aleatoria (3 algoritmos diferentes)
        function ultraMezcla(arr) {
            // Clonar para no modificar original
            let resultado = [...arr];
            
            // Algoritmo 1: Fisher-Yates estándar (2 pasadas)
            for(let pase = 0; pase < 2; pase++) {
                for(let i = resultado.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [resultado[i], resultado[j]] = [resultado[j], resultado[i]];
                }
            }
            
            // Algoritmo 2: Mezcla por intercambios aleatorios (20 iteraciones extra)
            for(let k = 0; k < resultado.length * 3; k++) {
                const i = Math.floor(Math.random() * resultado.length);
                const j = Math.floor(Math.random() * resultado.length);
                [resultado[i], resultado[j]] = [resultado[j], resultado[i]];
            }
            
            // Algoritmo 3: Reordenación con corte aleatorio
            const corte = Math.floor(Math.random() * resultado.length);
            const primeraMitad = resultado.slice(0, corte);
            const segundaMitad = resultado.slice(corte);
            resultado = [...segundaMitad, ...primeraMitad];
            
            // Algoritmo 4: Inversión parcial aleatoria
            if(Math.random() > 0.5) {
                const inicio = Math.floor(Math.random() * resultado.length);
                const fin = Math.floor(Math.random() * (resultado.length - inicio)) + inicio;
                const subArray = resultado.slice(inicio, fin).reverse();
                resultado.splice(inicio, fin - inicio, ...subArray);
            }
            
            return resultado;
        }
        
        function generarMiniaturaGato(gato, width, height) {
            const miniCanvas = document.createElement("canvas");
            miniCanvas.width = width;
            miniCanvas.height = height;
            const miniCtx = miniCanvas.getContext("2d");
            dibujarGatoEnContexto(miniCtx, width, height, gato.colores);
            return miniCanvas;
        }
        
        function initJuegoAdaptativo() {
            if(timeoutId) clearTimeout(timeoutId);
            lock = false; firstIdx = null; wrong1 = null; wrong2 = null; gameWin = false;
            
            let numGatos = coleccion.length;
            if(numGatos < 2) return;
            let gatosUsar = coleccion.slice(0, Math.min(numGatos, 8));
            
            let cartasBase = [];
            for(let gato of gatosUsar) {
                cartasBase.push({ gato: gato, matched: false, flipped: false });
                cartasBase.push({ gato: gato, matched: false, flipped: false });
            }
            
            // APLICAR MEZCLA ULTRA ALEATORIA
            juegoCards = ultraMezcla(cartasBase);
            
            const columnas = Math.min(4, Math.ceil(Math.sqrt(juegoCards.length)));
            renderizarJuegoAdaptativo(gatosUsar.length, columnas);
        }
        
        function renderizarJuegoAdaptativo(totalPares, columnas) {
            let parejasCompletadas = juegoCards.filter(c=>c.matched).length / 2;
            let victoria = (parejasCompletadas === totalPares && !gameWin);
            if(victoria) {
                gameWin = true;
                let puntosGanados = totalPares * 3;
                puntosMinijuego += puntosGanados;
            }
            
            let html = `<div class="board" style="grid-template-columns: repeat(${columnas}, minmax(90px, 110px));">`;
            for(let i=0; i<juegoCards.length; i++) {
                let card = juegoCards[i];
                let cls = 'card';
                if(card.flipped || card.matched) cls += ' flipped';
                if(card.matched) cls += ' matched';
                if((wrong1===i || wrong2===i) && !card.matched) cls += ' wrong';
                html += `<div class="${cls}" onclick="window.juegoClickAdaptativo(${i})">`;
                if(card.flipped || card.matched) {
                    const miniCanvas = generarMiniaturaGato(card.gato, 90, 90);
                    const dataURL = miniCanvas.toDataURL();
                    html += `<img src="${dataURL}" style="width:90px;height:90px;">`;
                }
                html += `</div>`;
            }
            html += '</div>';
            
            if(victoria) {
                html += `<div class="victoria-mensaje">🎉 ¡VICTORIA! +${totalPares*3} PUNTOS 🎉</div>`;
                html += `<div class="puntos-victoria">🏆 PUNTOS TOTALES: ${puntosMinijuego} 🏆</div>`;
                html += `<div style="margin-top:10px;"><button id="btnNuevoJuegoGato">🔄 Nuevo juego</button>`;
                html += `<button id="btnVolverMenuGato" class="volver-btn">🏠 Volver al menú</button></div>`;
            } else {
                html += `<div id="statusJuego"></div>`;
                html += `<div style="margin-top:5px; font-weight:bold;">🏆 Puntos: ${puntosMinijuego}</div>`;
                html += `<div style="margin-top:10px;"><button id="btnResetJuegoGato">🔄 Nuevo juego</button>`;
                html += `<button id="btnVolverMenu" class="volver-btn">🏠 Volver al menú</button></div>`;
            }
            
            modalContent.innerHTML = html;
            
            if(!victoria) {
                const statusDiv = document.getElementById("statusJuego");
                if(statusDiv) statusDiv.innerText = `Parejas: ${parejasCompletadas}/${totalPares}`;
            }
            
            document.getElementById("btnResetJuegoGato")?.addEventListener("click", () => initJuegoAdaptativo());
            document.getElementById("btnNuevoJuegoGato")?.addEventListener("click", () => initJuegoAdaptativo());
            document.getElementById("btnVolverMenu")?.addEventListener("click", () => mostrarMenu());
            document.getElementById("btnVolverMenuGato")?.addEventListener("click", () => mostrarMenu());
        }
        
        window.juegoClickAdaptativo = function(idx) {
            if(lock || gameWin) return;
            let card = juegoCards[idx];
            if(card.matched || card.flipped) return;
            if(firstIdx === null) {
                card.flipped = true;
                firstIdx = idx;
                let numGatos = Math.min(coleccion.length, 8);
                let columnas = Math.min(4, Math.ceil(Math.sqrt(numGatos * 2)));
                renderizarJuegoAdaptativo(numGatos, columnas);
                return;
            }
            if(firstIdx === idx) return;
            let card2 = juegoCards[firstIdx];
            card.flipped = true;
            let numGatos = Math.min(coleccion.length, 8);
            let columnas = Math.min(4, Math.ceil(Math.sqrt(numGatos * 2)));
            renderizarJuegoAdaptativo(numGatos, columnas);
            if(card2.gato === card.gato) {
                card2.matched = true;
                card.matched = true;
                firstIdx = null;
                renderizarJuegoAdaptativo(numGatos, columnas);
            } else {
                lock = true;
                wrong1 = firstIdx; wrong2 = idx;
                renderizarJuegoAdaptativo(numGatos, columnas);
                timeoutId = setTimeout(()=>{
                    if(!juegoCards[firstIdx].matched) juegoCards[firstIdx].flipped = false;
                    if(!juegoCards[idx].matched) juegoCards[idx].flipped = false;
                    firstIdx = null; lock = false; wrong1 = null; wrong2 = null;
                    renderizarJuegoAdaptativo(numGatos, columnas);
                    timeoutId = null;
                },600);
            }
        };
        
        function mostrarMenu() {
            if(timeoutId) clearTimeout(timeoutId);
            modalContent.innerHTML = `
                <div class="menu-minijuego">
                    <h3>🎮 Minijuegos</h3>
                    <div class="puntuacion-menu">🏆 PUNTOS: ${puntosMinijuego} 🏆</div>
                    <div style="font-size:0.8rem; background:#eee; padding:0.2rem;">✨ Mezcla ULTRA aleatoria (4 algoritmos) ✨</div>
                    <button id="btnPar" class="btn-par">PARES (${coleccion.length} gatos = ${Math.min(coleccion.length, 8)} pares)</button>
                    <button id="btnCerrarMenu" class="volver-btn">Cerrar</button>
                </div>
            `;
            document.getElementById("btnPar")?.addEventListener("click", () => {
                if(coleccion.length >= 2) initJuegoAdaptativo();
                else {
                    mostrarMensaje("Necesitas al menos 2 gatos para jugar");
                    mostrarMenu();
                }
            });
            document.getElementById("btnCerrarMenu")?.addEventListener("click", () => cerrarModal());
        }
        
        function abrirModal() {
            if(coleccion.length < 2) return;
            mostrarMenu();
            modal.style.display = "flex";
        }
        
        function cerrarModal() {
            if(timeoutId) clearTimeout(timeoutId);
            modal.style.display = "none";
        }
        
        // Eventos
        btnElegirComida.addEventListener("click", elegirComida);
        btnPonerNombre.addEventListener("click", ponerNombreYColeccionar);
        btnFusionar.addEventListener("click", fusionar);
        btnMinijuego.addEventListener("click", abrirModal);
        nombreGatoInput.addEventListener("keypress", (e) => { if(e.key==="Enter" && gatoPresente!==null) ponerNombreYColeccionar(); });
        
        function init() {
            comidaActual = null;
            gatoPresente = null;
            coleccion = [];
            comidasEspeciales = [];
            puntosMinijuego = 0;
            renderizarColeccion();
            actualizarSelectorComidas();
            actualizarPlatoUI();
            limpiarCanvas();
            zonaNombre.style.display = "none";
            btnElegirComida.disabled = false;
            selectorComida.disabled = false;
            cancelarTimer();
        }
        
        init();
    })();
</script>
